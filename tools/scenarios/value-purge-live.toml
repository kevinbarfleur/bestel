name = "value-purge-live"
description = """
Live validation of the value-purge sprint — focused scope per user
request: Haiku 4.5 (7 tests, full audit hit list), DeepSeek V4-Flash
(5 tests, mid-coverage), Anthropic Sonnet 4.6 (3 tests, sanity).

Each test fires a known-stale claim from the 2026-05-12 audit. The
post-sprint expectation:
  - the assistant called wiki_parse / repoe_lookup this turn,
  - the answer cites the live value with the wiki URL OR says
    "the chronicles are silent" if the fetch fails,
  - the historically-stale value does NOT appear unsourced.

The `eval` step at the end of each session captures the chat state
JSON so we can inspect the tool-call sequence + final text offline.
"""

# ============================================================
# MODEL: Haiku 4.5 — primary enforcement target (full 7-test sweep)
# ============================================================
[[step]]
type = "set-model"
id = "anthropic-haiku-4-5"

# T1 — Mind Over Matter (refs cited 30%, wiki says 40%)
[[step]]
type = "new-chat"

[[step]]
type = "send"
text = "how much damage does Mind over Matter actually mitigate"

[[step]]
type = "wait-completion-or-crash"
timeout_ms = 180000

[[step]]
type = "eval"
expr = "JSON.stringify({test:'haiku_T1_MoM', model: window.__bestel.getActiveModel()?.id, state: window.__bestel.getChatState()})"

# T2 — Spine Bow APS (refs cited 1.50, wiki says 1.40)
[[step]]
type = "new-chat"

[[step]]
type = "send"
text = "is spine bow really 1.5 attacks per second"

[[step]]
type = "wait-completion-or-crash"
timeout_ms = 180000

