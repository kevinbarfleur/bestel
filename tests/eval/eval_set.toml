# Bestel — eval set (60 questions across 6 categories).
#
# Each entry below is split by the `eval_split` example into a standalone
# scenario file under `tests/eval/scenarios/<id>.toml` so the existing
# `bestel run-battery` harness can drive them. The judge step
# (`bestel eval-judge`) reads `expected_signals` / `forbidden_signals`
# from the original entry to grade the run.
#
# Voice is preserved (real Reddit / forum / Maxroll comment shape).
#
# Categories:
#   - mechanic (12)        small targeted PoE1 mechanic questions
#   - craft (12)           crafting / itemisation lookups
#   - build (15)           build-diagnosis, most need a loaded PoB
#   - mapping (12)         endgame / atlas / currency / boss
#   - comparison (5)       PoE1↔PoE2 cross-game (must NOT contaminate)
#   - refusal (4)          off-topic; must refuse in-character
#
# `needs_build` entries set `build_fixture` so run-battery loads the
# corresponding PoB XML. `applies_to` defaults to ["poe1", "poe2"];
# Sprint H tags PoE2-specific entries with applies_to=["poe2"] so the
# RAG layer's `array_has(applies_to, 'poe2')` filter can isolate PoE2
# scenarios for the `zero PoE1↔PoE2 contamination` exit criterion.

