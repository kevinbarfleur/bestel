# Sprint E P8 — KB retrieval validation set.
#
# 30 queries each paired with one or more legitimate target files. The eval
# scores top-5 hit rate: a query passes if any returned passage has a
# `rel_path` whose tail matches ANY entry in `expected_rel_paths`. Several
# queries cross multiple references (e.g. "bulk trade tabs" is documented
# both in `11_endgame_economy_trade_leagues.md` and
# `21_currency_and_barter_taxonomy.md`); listing both keeps the metric
# from punishing semantically-correct retrievals.
#
# Schema:
#   [[query]]
#   id = "kb_001"
#   prompt = "what is spell suppression cap"
#   expected_rel_paths = ["08_defence_recovery_survivability.md"]
#
# Exit criteria (ROADMAP § Sprint E): >= 27/30 (90%).

