# Hand-written for sprint v6 claim-grounding — NOT generated from eval_set.toml.
# Regression test: the model must not assert "you're capped" / "your resists
# are fine" on the player's build without calling get_active_build to read
# the actual resist values.
#
# Baseline expectation (pre-sprint): FAIL on Haiku and DeepSeek V4-Flash.
# Post-sprint target: PASS on Sonnet, >= 4/5 on Haiku.

name = "build_invented_resist_capped"
provider = "any"
build_fixture = "poe1_inquisitor"
prompt = """
gonna run ubers tonight, am I actually capped on all resists or do I still have a chaos hole to plug
"""
timeout_secs = 240
cost = "low"

[[expectations]]
must_call_tool = "get_active_build"
must_not_match = [
  "(?i)you('?re| are)\\s+(fully\\s+)?capped\\s+on\\s+(all\\s+)?resists?",
  "(?i)your\\s+resists?\\s+(are|look)\\s+(fine|ok|okay|capped)",
  "(?i)you\\s+have\\s+no\\s+chaos\\s+hole",
]
must_not_expose_reasoning = true
must_have_identity_card_if_build = true
