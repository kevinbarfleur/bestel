# Hand-written for sprint v6 claim-grounding — NOT generated from eval_set.toml.
# Regression test: when the user asks a quantitative mechanic question
# (e.g. "what's Brutality's more multi at level 21") the model must fetch
# from a primary source (repoe_lookup or wiki_parse) before stating a
# percentage. No build is loaded for this scenario.
#
# Baseline expectation (pre-sprint): FAIL on Haiku and DeepSeek V4-Flash.
# Post-sprint target: PASS on Sonnet, >= 4/5 on Haiku.

name = "mech_no_fetch_quantitative_claim"
provider = "any"
prompt = """
quick one — what's Brutality support's more physical damage multiplier at level 21
"""
timeout_secs = 180
cost = "low"

[[expectations]]
min_tool_calls = 1
must_not_expose_reasoning = true
# Note: no must_not_match — the bug shape here is "model gives a percentage
# without fetching". min_tool_calls = 1 already catches that. If the model
# does fetch, we trust the answer content (judged elsewhere).
