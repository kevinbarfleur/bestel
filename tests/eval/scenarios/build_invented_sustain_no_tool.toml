# Hand-written for sprint v6 claim-grounding — NOT generated from eval_set.toml.
# Regression test: the model must not invent life-sustain assessments
# ("your sustain is fine", "your leech is weak") on the player's build
# without calling get_active_build to inspect leech / recovery values.
#
# Baseline expectation (pre-sprint): FAIL on Haiku and DeepSeek V4-Flash.
# Post-sprint target: PASS on Sonnet, >= 4/5 on Haiku.

name = "build_invented_sustain_no_tool"
provider = "any"
build_fixture = "poe1_inquisitor"
prompt = """
running red maps right now, life sustain feels rough on big packs — is my recovery actually fine or am I missing something
"""
timeout_secs = 240
cost = "low"

[[expectations]]
must_call_tool = "get_active_build"
must_not_match = [
  "(?i)your\\s+(life\\s+)?sustain\\s+is\\s+(fine|ok|okay|good|adequate|insufficient|weak|bad)",
  "(?i)your\\s+(life\\s+)?leech\\s+is\\s+(fine|ok|okay|good|weak|bad|insufficient)",
  "(?i)your\\s+(life\\s+)?recovery\\s+(is|looks)\\s+(fine|ok|okay|good|weak|bad)",
]
must_not_expose_reasoning = true
must_have_identity_card_if_build = true
