name: Release

# Triggered by pushing a tag like `v0.1.0` or `v1.2.3`. Builds Bestel on
# Windows + Linux, bundles the OS-native installers (.msi / .exe on
# Windows, .deb / .AppImage on Linux), and uploads them to a draft GitHub
# Release matching the tag. Edit the release notes by hand before
# publishing — the workflow only fills the artifacts.
#
# macOS support is currently out of scope (see docs/TODO.md). Add a
# matrix entry + .icns icon + titleBarStyle config when we revisit it.

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for dry-run testing without tagging.
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps (webkit + appindicator + AppImage tooling)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: crates/bestel/ui/package-lock.json

      - name: Install frontend deps
        working-directory: crates/bestel/ui
        run: npm ci

      - name: Build + bundle via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Path to the crate that contains tauri.conf.json.
          projectPath: crates/bestel
          # Tag name → release. tauri-action creates a draft release on the
          # first matrix run and reuses it on subsequent runs.
          tagName: ${{ github.ref_name }}
          releaseName: 'Bestel ${{ github.ref_name }}'
          releaseBody: |
            Desktop AI companion for Path of Exile.

            **Windows:** `.msi` (recommended) or `.exe` (NSIS installer).

            **Linux:** `.deb` (Debian / Ubuntu) or `.AppImage` (universal,
            chmod +x then run). webkit2gtk-4.1 must be installed system-wide
            for the AppImage to launch.

            See the README for setup (API keys, model selection).

            macOS support is on the roadmap but not in this build —
            see [docs/TODO.md](https://github.com/kevinbarfleur/bestel/blob/main/docs/TODO.md).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
